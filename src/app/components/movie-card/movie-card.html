<!-- Movie Card Template

Displays movie information:
- Image: movie poster or placeholder if none available.
- Title: movie title
- Rating: vote average
- Release date

Wrapped in a container div with class "movie-card".
-->

<div class="movie-card">

  <img [src]="posterUrl" alt="{{ movie.title }}" />

  <div class="movie-info">
    <h3>{{ movie.title }}</h3>

    <p class="rating">⭐ {{ movie.vote_average }}</p>

    <p class="date">{{ movie.release_date }}</p>
  </div>

</div>
